# /etc/nginx/conf.d/vya.conf
# Reverse-proxy → Flask (127.0.0.1:8000)
# Apex (vya.co.nz) is canonical; www → apex 301 redirect.
# certbot --nginx will rewrite this file to add SSL listeners on 443.

server {
    listen 80;
    listen [::]:80;
    server_name vya.co.nz www.vya.co.nz;

    # Larger limit so customers can submit notes/addresses
    client_max_body_size 4M;

    # ACME http-01 challenge (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# After certbot --nginx the above gets duplicated for SSL on 443
# and a 301 from www → apex is added automatically.
