<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>{% block title %}管理后台{% endblock %} · 薇雅厨房</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('admin.static', filename='admin.css') }}">
</head>
<body>
  {% if session.get('is_admin') %}
  <header class="adm-header">
    <div class="adm-brand">
      <span class="brand-stamp">薇</span>
      <span class="brand-text">薇雅厨房 · 后台</span>
    </div>
    <nav class="adm-nav">
      <a href="{{ url_for('admin.dashboard') }}" class="{{ 'active' if request.endpoint == 'admin.dashboard' }}">概览</a>
      <a href="{{ url_for('admin.weekly') }}"   class="{{ 'active' if request.endpoint == 'admin.weekly' }}">本周/下周菜单</a>
      <a href="{{ url_for('admin.menu') }}"     class="{{ 'active' if request.endpoint == 'admin.menu' }}">菜单管理</a>
      <a href="{{ url_for('admin.orders') }}"   class="{{ 'active' if request.endpoint in ('admin.orders', 'admin.order_detail') }}">订单</a>
      <a href="/" target="_blank" class="external">查看前台 ↗</a>
      <a href="{{ url_for('admin.logout') }}" class="logout">退出</a>
    </nav>
  </header>
  {% endif %}

  <main class="adm-main">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="adm-flash adm-flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
